name: Deploy Seminar App

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'theme/react-seminar/**'
      - '.github/workflows/deploy-seminar.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: theme/react-seminar/package-lock.json
      
      - name: Install dependencies
        working-directory: theme/react-seminar
        run: npm ci
      
      - name: Build React app
        working-directory: theme/react-seminar
        run: npm run build
      
      - name: List build files
        working-directory: theme/react-seminar
        run: |
          echo "=== Build files ==="
          ls -la dist/
          echo "=== Assets ==="
          ls -la dist/assets/
      
      - name: Deploy to SFTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: theme/react-seminar/dist/
          server-dir: /seminar/
          protocol: sftp
